spring:
  application:
    name: customer-agent
  profiles:
    active: dev

  # MyBatis-Plus
  datasource:
    url: jdbc:postgresql://localhost:5433/customer_agent
    username: pgvector
    password: pgvector
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # Redis
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      password:
#      timeout: 3000ms
#      lettuce:
#        pool:
#          max-active: 20
#          max-idle: 10
#          min-idle: 5

  # SQL 初始化
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

  # Spring AI OpenAI 兼容接口
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
          maxTokens: 5000
      embedding:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/
        api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
        options:
          model: text-embedding-v4
          dimmension: 1024
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1536
        initialize-schema: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-enums-package: com.example.customeragent.model

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8

logging:
  level:
    com.example.customeragent: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
